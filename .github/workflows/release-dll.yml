name: Build DLL

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          path: project

      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Build release DLL
        working-directory: project
        run: cargo build --release --target x86_64-pc-windows-msvc --target-dir target/release-build

      - name: Collect DLL
        working-directory: project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release-build/x86_64-pc-windows-msvc/release/*.dll dist/

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v7
        with:
          name: assisted-deployment-and-departure-windows-x64
          path: project/dist/*.dll
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: project
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/*.dll --clobber
          } else {
            gh release create $tag dist/*.dll --generate-notes
          }
